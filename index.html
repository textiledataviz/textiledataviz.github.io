<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handbook of Data Visualization with Textiles</title>
  <meta name="description" content="Handbook of Data Visualization with Textiles — coming April 2026">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://textiledataviz.org/">
  <meta property="og:title" content="Handbook of Data Visualization with Textiles">
  <meta property="og:description" content="Coming April 2026">
  <meta property="og:image" content="https://textiledataviz.org/noun-weave.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Handbook of Data Visualization with Textiles">
  <meta name="twitter:description" content="Coming April 2026">
  <meta name="twitter:image" content="https://textiledataviz.org/noun-weave.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sassy+Frass&display=swap');

    :root {
      color-scheme: dark;
      --bg: #000000;
      --text: #f5f1e8;
      --muted: #d3cab8;
      --shadow: rgba(0, 0, 0, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at center, rgba(0, 0, 0, 0.18) 0%, rgba(0, 0, 0, 0.84) 72%),
        url('./noun-weave.svg');
      background-position: center;
      background-repeat: no-repeat;
      background-size: min(72rem, 92vw);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      text-align: center;
    }

    main {
      max-width: 60rem;
      text-shadow: 0 0.2rem 1.25rem var(--shadow);
    }

    h1 {
      margin: 0;
      font-family: "Sassy Frass", cursive;
      font-size: clamp(4rem, 11vw, 8.75rem);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: 0.01em;
    }

    p {
      margin: 1.75rem 0 0;
      font-size: clamp(1rem, 2vw, 1.5rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      body {
        padding: 1.5rem;
        background-size: 135vw;
      }

      p {
        letter-spacing: 0.16em;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Handbook of Data Visualization with Textiles</h1>
    <p>coming April 2026</p>
  </main>
  <p>Want to join a virtual version of the spring <em>Data Visualization with Textiles </em> class? <a href="https://docs.google.com/forms/d/e/1FAIpQLSc-46VD8MmBIWtiouzb3igarUWerHuzE8kLarWwZ86qMibEwA/viewform?usp=dialog">Read more and sign up here.</a></p>
</body>
</html>
